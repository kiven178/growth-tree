<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>编程成长树 - 家长登录</title>
  <style>
    body {
      margin: 0; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      background: linear-gradient(135deg, #a5d6a7, #c8e6c9);
      font-family: 'PingFang SC', sans-serif;
    }
    .login-card {
      background: white; padding: 30px 25px; border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      width: 300px; text-align: center; position: relative;
    }
    h2 { color: #2e7d32; margin-bottom: 25px; }
    input {
      width: 100%; padding: 10px; margin: 8px 0;
      border: 1px solid #ccc; border-radius: 10px;
      font-size: 16px; box-sizing: border-box;
    }
    button {
      width: 100%; padding: 12px; background: #43a047;
      color: white; border: none; border-radius: 10px;
      font-size: 18px; cursor: pointer; margin-top: 10px;
    }
    .error { color: #d32f2f; font-size: 14px; margin-top: 8px; display: none; }
    .bg-btn {
      position: absolute; top: 10px; right: 10px;
      background: none; border: none; font-size: 20px; cursor: pointer;
      color: #888; padding: 5px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <button class="bg-btn" title="更换背景" onclick="changeBg()">🖼️</button>
    <h2>🌱 进入孩子的成长花园</h2>
    <input type="text" id="nameInput" list="studentList" placeholder="输入孩子姓名">
    <datalist id="studentList">
      
      <option value="小明">
      
      <option value="小红">
      
    </datalist>
    <input type="password" id="passwordInput" placeholder="请输入成长密码">
    <div class="error" id="errorMsg">❌ 姓名或密码错误</div>
    <button onclick="login()">✨ 进入成长树</button>
  </div>

  <script>
    const studentMap = {
      
      "小明": {
        "password": "1234",
        "url": "小明.html"
      },
      
      "小红": {
        "password": "5678",
        "url": "小红.html"
      }
      
    };

    function login() {
      const name = document.getElementById('nameInput').value.trim();
      const pwd = document.getElementById('passwordInput').value;
      const errorEl = document.getElementById('errorMsg');
      if (studentMap[name] && studentMap[name].password === pwd) {
        sessionStorage.setItem('growth_login', 'true');
        sessionStorage.setItem('growth_name', name);
        window.location.href = studentMap[name].url;
      } else {
        errorEl.style.display = 'block';
      }
    }
    document.getElementById('passwordInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') login();
    });
    function changeBg() {
      const url = prompt('请输入背景图片链接（留空恢复默认）');
      if (url !== null) {
        if (url.trim() === '') {
          localStorage.removeItem('growth_bg');
        } else {
          localStorage.setItem('growth_bg', url.trim());
        }
        // 刷新当前页面背景
        document.body.style.backgroundImage = url ? `url(${url})` : '';
      }
    }
    // 页面加载时应用本地背景
    (function() {
      const savedBg = localStorage.getItem('growth_bg');
      if (savedBg) document.body.style.backgroundImage = `url(${savedBg})`;
    })();
  </script>
</body>
</html>
